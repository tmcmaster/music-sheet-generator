<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Markov Chain Melody Generator</title>
</head>
<body>
<h1>Enhanced Markov Chain Melody Generator</h1>
<button id="generate">Generate and Play Melody</button>
<pre id="output"></pre>

<script>
    const baseFrequencies = {
        "C": 261.63,
        "D": 293.66,
        "E": 329.63,
        "F": 349.23,
        "G": 392.00,
        "A": 440.00,
        "B": 493.88
    };

    function getFrequency(note, octaveShift = 0) {
        return baseFrequencies[note] * Math.pow(2, octaveShift);
    }

    const transitions = {
        "C": {"C": 0.1, "D": 0.3, "E": 0.3, "G": 0.2, "A": 0.1},
        "D": {"C": 0.1, "D": 0.1, "E": 0.4, "F": 0.2, "G": 0.2},
        "E": {"C": 0.2, "D": 0.1, "E": 0.1, "F": 0.2, "G": 0.3, "A": 0.1},
        "F": {"C": 0.1, "D": 0.1, "E": 0.3, "F": 0.2, "G": 0.3},
        "G": {"C": 0.2, "D": 0.2, "E": 0.2, "G": 0.1, "A": 0.3},
        "A": {"C": 0.2, "D": 0.3, "E": 0.2, "G": 0.2, "A": 0.1}
    };

    const rhythmPatterns = [0.25, 0.5, 0.75, 1.0];

    const chords = {
        "C": ["C", "E", "G"],
        "D": ["D", "F", "A"],
        "E": ["E", "G", "B"],
        "F": ["F", "A", "C"],
        "G": ["G", "B", "D"],
        "A": ["A", "C", "E"]
    };

    function chooseNextNote(currentNote) {
        const nextNotes = Object.keys(transitions[currentNote]);
        const probabilities = Object.values(transitions[currentNote]);

        let cumulative = 0;
        const cumulativeProbabilities = probabilities.map(prob => cumulative += prob);

        const randomValue = Math.random();
        const nextNoteIndex = cumulativeProbabilities.findIndex(cumulativeProb => randomValue < cumulativeProb);
        return nextNotes[nextNoteIndex];
    }

    function generateMelody(startNote, length) {
        const melody = [];
        let currentNote = startNote;

        for (let i = 0; i < length; i++) {
            const octaveShift = Math.floor(Math.random() * 3) - 1;
            const duration = rhythmPatterns[Math.floor(Math.random() * rhythmPatterns.length)];

            currentNote = chooseNextNote(currentNote);
            melody.push({ note: currentNote, duration, octaveShift });
        }

        return melody;
    }

    function playMelody(melody, tempo = 120) {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let currentTime = audioCtx.currentTime;

        melody.forEach(({ note, duration, octaveShift }, index) => {
            const oscillator = audioCtx.createOscillator();
            oscillator.frequency.value = getFrequency(note, octaveShift);
            oscillator.type = 'sine';

            const gainNode = audioCtx.createGain();
            const attack = 0.01;
            const release = 0.01;

            gainNode.gain.setValueAtTime(0, currentTime);
            gainNode.gain.linearRampToValueAtTime(0.4, currentTime + attack);
            gainNode.gain.setValueAtTime(0.4, currentTime + (60 / tempo) * duration - release);
            gainNode.gain.linearRampToValueAtTime(0, currentTime + (60 / tempo) * duration);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start(currentTime);
            oscillator.stop(currentTime + (60 / tempo) * duration);

            currentTime += (60 / tempo) * duration;
        });
    }

    document.getElementById('generate').addEventListener('click', () => {
        const melody = generateMelody("C", 16);
        const formattedMelody = melody.map(({ note, duration, octaveShift }) =>
            `${note}${octaveShift >= 0 ? "+" : ""}${octaveShift} (${duration}s)`
        ).join(" | ");
        document.getElementById('output').textContent = "Generated Melody: " + formattedMelody;

        playMelody(melody, 120);
    });
</script>
</body>
</html>
